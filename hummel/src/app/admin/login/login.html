<div class="login-container">
  <div class="login-left">
    <div class="brand">HUMMEL</div>

    <h1>Admin Dashboard</h1>

    <p>Gestiona productos, controla pedidos y monitorea el rendimiento de tu marca deportiva.</p>
  </div>

  <div class="login-right">
    <div class="login-card">
      <h2>Iniciar sesión</h2>

      <input type="email" placeholder="Email" [(ngModel)]="email" />

      <!-- CAMBIO: campo contraseña con ojito para ver/ocultar -->
      <div class="password-field">
        <input
          [type]="mostrarPassword ? 'text' : 'password'"
          placeholder="Contraseña"
          [(ngModel)]="password"
        />
        <button
          type="button"
          class="toggle-password"
          (click)="mostrarPassword = !mostrarPassword"
          tabindex="-1"
        >
          <i [class]="mostrarPassword ? 'bi bi-eye-slash' : 'bi bi-eye'"></i>
        </button>
      </div>

      <button (click)="login()" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Entrar al panel' }}
      </button>
    </div>
  </div>
</div>
